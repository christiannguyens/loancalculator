<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Loan Calculator</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    input { margin: 5px 0; width: 100%; padding: 8px; }
    button { padding: 10px 20px; margin-top: 10px; }
    #result { margin-top: 20px; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Loan Calculator</h1>
  
  <label>Principal ($):</label>
  <input type="number" id="principal" placeholder="Enter loan amount">
  
  <label>Annual Interest Rate (%):</label>
  <input type="number" id="rate" placeholder="Enter interest rate">
  
  <label>Months:</label>
  <input type="number" id="months" placeholder="Enter months">
  
  <button onclick="calculateLoan()">Calculate</button>
  
  <div id="result"></div>

  <script>
    function calculateLoan() {
      let principal = parseFloat(document.getElementById('principal').value);
      let rate = parseFloat(document.getElementById('rate').value) / 100 / 12;
      let months = parseInt(document.getElementById('months').value);
      
      if(isNaN(principal) || isNaN(rate) || isNaN(months)) {
        document.getElementById('result').innerText = "Please enter all values!";
        return;
      }
      
      let monthlyPayment = (principal * rate) / (1 - Math.pow(1 + rate, -months));
      monthlyPayment = monthlyPayment.toFixed(2);
      
      document.getElementById('result').innerText = `Monthly Payment: $${monthlyPayment}`;
    }
  </script>
</body>
</html>
